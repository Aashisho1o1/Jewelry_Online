backend:
  name: github
  repo: Aashisho1o1/Jewelry_Online
  branch: main
  base_url: https://www.aashish.website
  auth_endpoint: auth

# Store uploaded images in Vite's served public directory
media_folder: "client/public/images/jewelry"
public_folder: "/images/jewelry"

# Use local media storage instead of external CDN
# media_library:
#   name: uploadcare
#   config:
#     publicKey: "demopublickey"

# Global settings for the CMS
local_backend: false
display_url: https://www.aashish.website

collections:
  # Jewelry Products Management - Individual Product Files
  - name: "jewelry"
    label: "Jewelry Products"
    folder: "content/jewelry"
    create: true
    slug: "{{id}}"
    fields:
      - { label: "Product ID", name: "id", widget: "string", hint: "Unique code like NS001, ER002, etc." }
      - { label: "Product Name", name: "name", widget: "string", hint: "e.g., Timeless Elegance Silver Necklace" }
      - { label: "Description", name: "description", widget: "text", hint: "Detailed product description for customers" }
      - { label: "Price (NPR)", name: "price", widget: "number", value_type: "int", min: 500, max: 500000 }
      - { label: "Original Price (NPR)", name: "originalPrice", widget: "number", value_type: "int", min: 500, max: 500000, required: false }
      - label: "Price Mode"
        name: "priceMode"
        widget: "select"
        default: "manual"
        required: false
        hint: "Use live metal pricing only for products that should move with the daily silver/gold rate."
        options:
          - "manual"
          - "live_metal"
      - { label: "Main Product Image", name: "image", widget: "image", hint: "Primary product photo" }
      - label: "Gallery Images (optional)"
        name: "images"
        widget: "list"
        required: false
        hint: "Add multiple photos for product gallery and close-up views."
        field:
          label: "Image"
          name: "image"
          widget: "image"
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "rings"
          - "necklaces"
          - "earrings"
          - "bracelets"
          - "sets"
          - "tilahari"
          - "mangalsutra"
          - "sikri"
          - "baala"
          - "bulaki"
          - "pote"
          - "pauju"
          - "maang-tika"
          - "haar"
          - "dhungri"
      - label: "Material"
        name: "material"
        widget: "select"
        default: "925_silver"
        options:
          - "925_silver"
          - "gold_plated"
          - "rose_gold_plated"
          - "gold_18k"
          - "gold_22k"
          - "gold_24k"
          - "stone_studded"
          - "mixed_metals"
          - "beaded"
      - { label: "Weight (optional)", name: "weight", widget: "string", required: false, hint: "Example: 12.5g" }
      - label: "Pricing Weight (grams)"
        name: "pricingWeightGrams"
        widget: "number"
        value_type: "float"
        required: false
        hint: "Optional override for live pricing. Use metal-only grams if the display weight includes stones."
      - label: "Metal Rate Key"
        name: "metalRateKey"
        widget: "select"
        required: false
        hint: "Optional override. Leave blank to infer from material."
        options:
          - "silver_925"
          - "gold_18k"
          - "gold_22k"
          - "gold_24k"
      - { label: "Price Rounding Increment", name: "priceRoundingIncrement", widget: "number", value_type: "int", required: false, hint: "Example: 10 or 50 for live price rounding." }
      - { label: "Dimensions (optional)", name: "dimensions", widget: "string", required: false, hint: "Example: 18 in chain length" }
      - { label: "Stone Type (optional)", name: "stoneType", widget: "string", required: false, hint: "Example: Ruby, Emerald, CZ" }
      - { label: "Occasion (optional)", name: "occasion", widget: "string", required: false, hint: "Example: Wedding, Daily Wear, Festive" }
      - label: "Occasions"
        name: "occasions"
        widget: "list"
        required: false
        hint: "Used for Shop By pages. Example: Daily Wear, Birthday Gift, Anniversary"
        field:
          label: "Occasion"
          name: "occasion"
          widget: "string"
      - label: "Recipients"
        name: "recipients"
        widget: "list"
        required: false
        hint: "Example: Her, Mother, Sister"
        field:
          label: "Recipient"
          name: "recipient"
          widget: "string"
      - label: "Styles"
        name: "styles"
        widget: "list"
        required: false
        hint: "Example: Minimal, Statement, Classic"
        field:
          label: "Style"
          name: "style"
          widget: "string"
      - label: "Colors"
        name: "colors"
        widget: "list"
        required: false
        hint: "Example: Silver, Rose Gold, White"
        field:
          label: "Color"
          name: "color"
          widget: "string"
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Short merchandising labels like Giftable, Everyday, Signature"
        field:
          label: "Tag"
          name: "tag"
          widget: "string"
      - label: "Care Tips"
        name: "care"
        widget: "list"
        required: false
        hint: "One care instruction per line"
        field:
          label: "Care Tip"
          name: "care_tip"
          widget: "string"
      - { label: "Plating / Finish", name: "plating", widget: "string", required: false, hint: "Example: Rose gold plated, High-polish silver finish" }
      - { label: "Collection", name: "collection", widget: "string", required: false, hint: "Example: Everyday Silver, Signature Rings" }
      - { label: "Metal Tone", name: "metalTone", widget: "string", required: false, hint: "Example: Silver, Rose Gold" }
      - { label: "Size Guide Note", name: "sizeGuide", widget: "string", required: false, hint: "Short note for size guidance" }
      - { label: "Fit Notes", name: "fitNotes", widget: "text", required: false, hint: "Explain how the piece fits or should be styled" }
      - { label: "Delivery Estimate", name: "deliveryEstimate", widget: "string", required: false, hint: "Example: Dispatch in 2 to 4 business days" }
      - { label: "Warranty / Support", name: "warranty", widget: "string", required: false, hint: "Example: 30-day return support and finish-care guidance" }
      - { label: "Gift Wrap Available", name: "giftWrapAvailable", widget: "boolean", default: true, required: false }
      - { label: "Gift Card Assistance Available", name: "giftCardAvailable", widget: "boolean", default: false, required: false }
      - label: "Complete The Look Product IDs"
        name: "bundleIds"
        widget: "list"
        required: false
        hint: "Add matching product IDs like ER002, NS001"
        field:
          label: "Product ID"
          name: "bundle_id"
          widget: "string"
      - label: "Review Entries"
        name: "reviews"
        widget: "list"
        required: false
        hint: "Format each line as Name|5|Review Title|Review text|/images/jewelry/example.jpg"
        field:
          label: "Review Entry"
          name: "review"
          widget: "string"
      - label: "Customer Photos"
        name: "customerPhotos"
        widget: "list"
        required: false
        hint: "Use lifestyle or customer-shot style images for the review gallery"
        field:
          label: "Customer Photo"
          name: "customer_photo"
          widget: "image"
      - { label: "In Stock", name: "inStock", widget: "boolean", default: true }
      - { label: "Featured Product", name: "featured", widget: "boolean", default: false }
      - { label: "New Arrival", name: "isNew", widget: "boolean", default: false }

  # Home Page Content
  - name: "home"
    label: "Home Page"
    files:
      - name: "home"
        label: "Home Page Content"
        file: "client/src/content/home.json"
        fields:
          - { label: "Hero Title", name: "title", widget: "string", hint: "Main headline - keep it inspiring!" }
          - { label: "Hero Subtitle", name: "subtitle", widget: "text", hint: "Compelling description of your jewelry business" }
          - { label: "Hero Background Image", name: "imageUrl", widget: "image", hint: "Beautiful jewelry hero image" }
          - name: "hero"
            label: "Hero Section"
            widget: "object"
            fields:
              - { label: "Welcome Text", name: "welcomeText", widget: "string", default: "WELCOME" }
              - { label: "Main Title", name: "mainTitle", widget: "string", default: "ELEGANT NEPALI JEWELRY" }
              - { label: "Description", name: "description", widget: "text", default: "Discover unique jewelry designs and exquisite craftsmanship" }
              - { label: "Hero Background Image", name: "heroImage", widget: "image", hint: "Main hero background image" }
              - { label: "Call to Action Button Text", name: "ctaText", widget: "string", default: "Shop Collection" }
              - { label: "Call to Action Link", name: "ctaLink", widget: "string", default: "/products" }
          - name: "features"
            label: "Why Choose Us"
            widget: "list"
            fields:
              - { label: "Feature Title", name: "title", widget: "string" }
              - { label: "Feature Description", name: "description", widget: "text" }
              - { label: "Feature Icon", name: "icon", widget: "select", options: ["diamond", "heart", "truck", "shield", "star"] }

  # About Page Content
  - name: "about"
    label: "About Us"
    files:
      - name: "about"
        label: "About Page Content"
        file: "client/src/content/about.json"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - name: "team"
            label: "Family Team Members"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "title", widget: "string", hint: "e.g., Founder, Designer, Quality Manager" }
              - { label: "Bio", name: "description", widget: "text" }
              - { label: "Profile Photo", name: "imageUrl", widget: "image" }
          - name: "story"
            label: "Our Story"
            widget: "object"
            fields:
              - { label: "Story Title", name: "title", widget: "string" }
              - { label: "Story Content", name: "content", widget: "markdown", hint: "Tell your jewelry business story" }
          - name: "craftsmanship"
            label: "Our Craftsmanship Process"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - name: "steps"
                label: "Crafting Steps"
                widget: "list"
                fields:
                  - { label: "Step Title", name: "title", widget: "string" }
                  - { label: "Step Description", name: "description", widget: "text" }
          - name: "contact"
            label: "Contact Information"
            widget: "object"
            fields:
              - { label: "Email Address", name: "email", widget: "string" }
              - { label: "Phone Number", name: "phone", widget: "string", hint: "Nepal phone format: +977-XX-XXXXXXX" }
              - { label: "WhatsApp Number", name: "whatsapp", widget: "string", required: false }

  # Website Settings
  - name: "settings"
    label: "Website Settings"
    files:
      - name: "settings"
        label: "Website Settings"
        file: "client/src/content/settings.json"
        fields:
          - { label: "Website Title", name: "siteTitle", widget: "string", default: "Aashish Jewellers" }
          - { label: "Company Name", name: "companyName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image", required: false }
          - name: "social"
            label: "Social Media Links"
            widget: "object"
            fields:
              - { label: "Facebook", name: "facebook", widget: "string", required: false }
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
              - { label: "TikTok", name: "tiktok", widget: "string", required: false }
              - { label: "WhatsApp Business", name: "whatsapp", widget: "string", required: false }
          - name: "footer"
            label: "Footer Information"
            widget: "object"
            fields:
              - { label: "Footer Text", name: "text", widget: "text" }
              - { label: "Copyright Text", name: "copyright", widget: "string" }

  # Media Library (for jewelry photos)
  - name: "media"
    label: "Jewelry Photos"
    folder: "client/public/images/jewelry"
    create: true
    fields:
      - { label: "Photo Title", name: "title", widget: "string" }
      - { label: "Product Related", name: "productId", widget: "string", required: false, hint: "Product ID this photo belongs to" }
      - { label: "Photo Type", name: "type", widget: "select", options: ["product", "lifestyle", "detail", "packaging"], default: "product" }
      - { label: "Alt Text", name: "alt", widget: "string", required: false, hint: "Important for accessibility and SEO" }
